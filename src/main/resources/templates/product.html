<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container d-flex justify-content-center" style="margin-top: 8%;">
    <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 600px;">
        <h2 class="pb-3 text-dark" th:text="${product.title}">Product title</h2>
        <img th:src="@{${product.image}}" class="img-fluid" alt="Product image">
        <p class="text-muted" th:text="${product.category}">Product category</p>
        <p th:text="${product.description}">Product description</p>
        <p class="font-weight-bold" th:text="'$' + ${product.price}">Product price</p>
        <div class="d-flex flex-column align-items-center pt-3">
            <button type="submit" class="btn btn-dark w-100">Buy</button>
        </div>
        <div class="d-flex flex-column align-items-center pt-3">
            <button type="submit" class="btn btn-dark w-100">Return to products</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
