spring.application.name=product-fetcher
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${DB_HOSTNAME}:${DB_PORT}/${DB_SCHEMA}
spring.datasource.username=${DB_USERNAME}
