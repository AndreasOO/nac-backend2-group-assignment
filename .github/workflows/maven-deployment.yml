# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "issue-79" ]

jobs:
  integration-tests-product-fetcher:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build project (compile only)
      run: mvn clean install -DskipTests

    - name: Run integration tests in product-fetcher module
      run: mvn test -pl product-fetcher -am -Dtest=ProductFetcherIT -Dsurefire.failIfNoSpecifiedTests=false

  integration-tests-web-app:
    needs: integration-tests-product-fetcher
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project (compile only)
        run: mvn clean install -DskipTests

      - name: Run integration tests in product-fetcher module
#        TODO: Change test name after issue-81 is merged
        run: mvn test -pl web-app -am -Dtest=IntegrationTests -Dsurefire.failIfNoSpecifiedTests=false

  build-and-push:
    needs: integration-tests-web-app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Maven project (skip tests)
        run: mvn clean install -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker web-app backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.spring
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker product-fetcher microservice image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.pf
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY_FETCHER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Images pushed successfully!"

