<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Show All Products</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    <style>
        table {
            border-collapse: collapse;
            width: auto;
        }

        th, td {
            text-align: left;
            padding: 5px;
            width: 100px;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <nav class="navbar navbar-expand-lg navbar-light bg-light fs-4">
        <a class="navbar-brand" href="#">FAKE STORE</a>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#"  sec:authorize="isAuthenticated()">Your account</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/orders}" sec:authorize="hasAuthority('Admin')">Orders</a>
                </li>
            </ul>
            <span class="navbar-text">
            <a class="btn btn-dark text-white" th:href="@{/loginView}">Login</a>
        </span>
        </div>
    </nav>


    <h2>ALL PRODUCTS</h2>

    <table>
        <thead>
        <tr>
            <th>Image</th>
            <th>Title</th>
            <th>Category</th>
            <th>Price</th>
            <th>Show</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td>
                <img th:src="${product.image}"
                     alt="Product image"
                     class="img-fluid"
                     style="width: 80px; height: 80px; object-fit: cover;">
            </td>
            <td th:text="${product.title}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.price}"></td>
            <td>
                <a th:href="@{/products/{id}(id=${product.id})}"
                   class="btn btn-primary btn-sm">
                    Show product
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
